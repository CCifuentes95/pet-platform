name: UI — CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - "pet-platform-ui/**"
      - ".github/workflows/ui-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "pet-platform-ui/**"
      - ".github/workflows/ui-ci.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Vercel after CI passes"
        type: boolean
        default: false

concurrency:
  group: ui-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: pet-platform-ui

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pet-platform-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: pet-platform-ui/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pet-platform-ui/pnpm-lock.yaml') }}-${{ hashFiles('pet-platform-ui/**/*.{ts,tsx,js,jsx,css}') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pet-platform-ui/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pet-platform-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        id: deploy
        run: |
          pnpm dlx vercel --prod --yes 2>&1 | tee deploy.log
          echo "url=$(grep -o 'https://[^ ]*\.vercel\.app' deploy.log | tail -1)" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
