name: API — CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - "pet-platform-app/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "pet-platform-app/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Render after CI passes"
        type: boolean
        default: false

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: pet-platform-app

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pet-platform-app/build/reports/tests/

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'

    environment:
      name: production

    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered on Render."
